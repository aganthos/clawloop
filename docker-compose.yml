services:
  n8n:
    image: n8nio/n8n:1.76.1
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=UTC
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n

  lfx-server:
    build: .
    ports:
      - "8400:8400"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    volumes:
      - ./config:/app/config:ro

volumes:
  n8n_data:
