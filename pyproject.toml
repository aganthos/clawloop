[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lfx"
version = "0.1.0"
description = "LfX — Learning from Experience unified learning API"
requires-python = ">=3.11"
license = "MIT"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
lfx = "lfx.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["lfx"]

[tool.pytest.ini_options]
testpaths = ["tests"]
