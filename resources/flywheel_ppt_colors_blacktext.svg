<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" width="960" height="340" font-family="Aptos, 'Aptos Display', Calibri, sans-serif">
  <defs>
    <marker id="arrow-right" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#CB8044"/>
    </marker>
    <marker id="arrow-top" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#CB8044"/>
    </marker>
    <marker id="arrow-bot" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#CB8044"/>
    </marker>
  </defs>

  <!-- Box 1: Analyse -->
  <rect x="30" y="110" width="180" height="80" rx="12" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="1.5"/>
  <text x="120" y="144" text-anchor="middle" font-size="15" font-weight="600" fill="#000000">Analyse</text>
  <text x="120" y="166" text-anchor="middle" font-size="11" fill="#AAAAAA">Understand your workflows</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="150" x2="258" y2="150" stroke="#CB8044" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <!-- Box 2: Setup -->
  <rect x="268" y="110" width="180" height="80" rx="12" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="1.5"/>
  <text x="358" y="144" text-anchor="middle" font-size="15" font-weight="600" fill="#000000">Setup</text>
  <text x="358" y="166" text-anchor="middle" font-size="11" fill="#AAAAAA">Configure agents &amp; tooling</text>

  <!-- Arrow 2 -->
  <line x1="458" y1="150" x2="496" y2="150" stroke="#CB8044" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <!-- Cycle group -->
  <!-- Box 3: Deploy & Collect -->
  <rect x="506" y="110" width="190" height="80" rx="12" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="1.5"/>
  <text x="601" y="144" text-anchor="middle" font-size="15" font-weight="600" fill="#000000">Deploy &amp; Collect</text>
  <text x="601" y="166" text-anchor="middle" font-size="11" fill="#AAAAAA">In production</text>

  <!-- Box 4: Train & Improve -->
  <rect x="746" y="110" width="190" height="80" rx="12" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="1.5"/>
  <text x="841" y="144" text-anchor="middle" font-size="15" font-weight="600" fill="#000000">Train &amp; Improve</text>
  <text x="841" y="166" text-anchor="middle" font-size="11" fill="#AAAAAA">RL, distillation, ICL</text>

  <!-- Top curved arrow: Deploy -> Train (logs, traces, feedback) -->
  <text x="721" y="62" text-anchor="middle" font-size="10" fill="#AAAAAA">logs, traces, feedback</text>
  <path d="M 601,108 C 640,60 802,60 841,108" stroke="#CB8044" stroke-width="1.5" fill="none" marker-end="url(#arrow-top)"/>

  <!-- Bottom curved arrow: Train -> Deploy (improved model) -->
  <path d="M 841,192 C 802,244 640,244 601,192" stroke="#CB8044" stroke-width="1.5" fill="none" marker-end="url(#arrow-bot)"/>
  <text x="721" y="248" text-anchor="middle" font-size="10" fill="#AAAAAA">improved model</text>

  <!-- Labels at bottom -->
  <text x="209" y="280" text-anchor="middle" font-size="10" font-weight="500" fill="#AAAAAA" letter-spacing="2">ONBOARDING</text>
  <text x="721" y="280" text-anchor="middle" font-size="10" font-weight="500" fill="#AAAAAA" letter-spacing="2">CONTINUOUS  IMPROVEMENT</text>
</svg>
