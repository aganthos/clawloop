<svg width="1400" height="380" viewBox="0 0 1400 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
  </defs>

  <!-- ═══ ROBOT "AGENT" — same design as RL slide ═══ -->
  <g transform="translate(100,212) scale(1.3)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head dome -->
    <path d="M-34,5 L-34,-14 C-34,-50 34,-50 34,-14 L34,5 Z"
          fill="none" stroke="#d8d4d0" stroke-width="2.5"/>
    <!-- Antenna -->
    <line x1="0" y1="-44" x2="0" y2="-60" stroke="#d8d4d0" stroke-width="2"/>
    <circle cx="0" cy="-64" r="4.5" fill="#e8a87c"/>
    <circle cx="0" cy="-64" r="9" fill="#e8a87c" opacity="0.08"/>
    <!-- Left eye -->
    <circle cx="-14" cy="-16" r="10" fill="none" stroke="#d8d4d0" stroke-width="2"/>
    <circle cx="-14" cy="-16" r="4.5" fill="#e8a87c"/>
    <circle cx="-17" cy="-19.5" r="2" fill="white" opacity="0.85"/>
    <circle cx="-11.5" cy="-14" r="0.9" fill="white" opacity="0.5"/>
    <!-- Right eye -->
    <circle cx="14" cy="-16" r="10" fill="none" stroke="#d8d4d0" stroke-width="2"/>
    <circle cx="14" cy="-16" r="4.5" fill="#e8a87c"/>
    <circle cx="11" cy="-19.5" r="2" fill="white" opacity="0.85"/>
    <circle cx="16.5" cy="-14" r="0.9" fill="white" opacity="0.5"/>
    <!-- Blush -->
    <ellipse cx="-27" cy="-4" rx="5.5" ry="3.5" fill="#e8a87c" opacity="0.12"/>
    <ellipse cx="27" cy="-4" rx="5.5" ry="3.5" fill="#e8a87c" opacity="0.12"/>
    <!-- Smile -->
    <path d="M-11,-3 Q0,8 11,-3" fill="none" stroke="#d8d4d0" stroke-width="1.8"/>
    <!-- Left ear -->
    <rect x="-40" y="-26" width="6" height="16" rx="2.5" fill="none" stroke="#d8d4d0" stroke-width="1.5"/>
    <line x1="-37" y1="-22" x2="-37" y2="-14" stroke="#e8a87c" stroke-width="1" opacity="0.45"/>
    <!-- Right ear -->
    <rect x="34" y="-26" width="6" height="16" rx="2.5" fill="none" stroke="#d8d4d0" stroke-width="1.5"/>
    <line x1="37" y1="-22" x2="37" y2="-14" stroke="#e8a87c" stroke-width="1" opacity="0.45"/>
    <!-- Body -->
    <rect x="-23" y="10" width="46" height="42" rx="13" fill="none" stroke="#d8d4d0" stroke-width="2.5"/>
    <circle cx="0" cy="31" r="6" fill="#e8a87c" opacity="0.1" stroke="#e8a87c" stroke-width="0.8"/>
    <!-- Left arm (waving) -->
    <line x1="-23" y1="22" x2="-40" y2="6" stroke="#d8d4d0" stroke-width="2"/>
    <circle cx="-42" cy="4" r="3.5" fill="#d8d4d0"/>
    <!-- Right arm -->
    <line x1="23" y1="26" x2="40" y2="38" stroke="#d8d4d0" stroke-width="2"/>
    <circle cx="42" cy="40" r="3.5" fill="#d8d4d0"/>
    <!-- Legs -->
    <line x1="-10" y1="52" x2="-10" y2="66" stroke="#d8d4d0" stroke-width="2"/>
    <ellipse cx="-10" cy="69" rx="5" ry="2.5" fill="#d8d4d0"/>
    <line x1="10" y1="52" x2="10" y2="66" stroke="#d8d4d0" stroke-width="2"/>
    <ellipse cx="10" cy="69" rx="5" ry="2.5" fill="#d8d4d0"/>
  </g>

  <!-- AGENT label -->
  <text x="100" y="78" text-anchor="middle"
        font-family="'Inter','Aptos Display','Aptos','Segoe UI',sans-serif" font-size="13" font-weight="700"
        fill="#e0dbd7" letter-spacing="1.5">AGENT</text>

  <!-- ═══ = SIGN ═══ -->
  <text x="200" y="230"
        text-anchor="middle" font-family="'Inter','Aptos','Segoe UI',sans-serif"
        font-size="48" font-weight="300" fill="rgba(240,235,231,0.4)">=</text>

  <!-- ═══ MODEL (WEIGHTS) CARD ═══ -->
  <rect x="222" y="85" width="248" height="250" rx="16"
        fill="none" stroke="rgba(240,235,231,0.18)" stroke-width="1.5"/>
  <text x="346" y="124" text-anchor="middle"
        font-family="'Inter','Aptos Display','Aptos','Segoe UI',sans-serif" font-size="15" font-weight="700"
        fill="#f0ebe7">Model</text>
  <text x="346" y="144" text-anchor="middle"
        font-family="'Inter','Aptos','Segoe UI',sans-serif" font-size="11"
        fill="rgba(240,235,231,0.5)">(Weights)</text>

  <!-- Dumbbell icon, centered at (346, 215) -->
  <g transform="translate(306,195)">
    <!-- Bar -->
    <rect x="16" y="13" width="48" height="12" rx="5" fill="#f472b6"/>
    <!-- Left inner plate -->
    <rect x="6" y="8" width="12" height="22" rx="3" fill="#db5fa0"/>
    <!-- Left outer plate -->
    <rect x="0" y="3" width="8" height="32" rx="2.5" fill="#be4d88"/>
    <!-- Right inner plate -->
    <rect x="62" y="8" width="12" height="22" rx="3" fill="#db5fa0"/>
    <!-- Right outer plate -->
    <rect x="72" y="3" width="8" height="32" rx="2.5" fill="#be4d88"/>
  </g>

  <!-- ═══ + SIGN ═══ -->
  <text x="492" y="230"
        text-anchor="middle" font-family="'Inter','Aptos','Segoe UI',sans-serif"
        font-size="48" font-weight="300" fill="rgba(240,235,231,0.4)">+</text>

  <!-- ═══ HARNESS OUTER CARD ═══ -->
  <rect x="514" y="85" width="862" height="250" rx="16"
        fill="none" stroke="rgba(240,235,231,0.18)" stroke-width="1.5"/>
  <text x="945" y="124" text-anchor="middle"
        font-family="'Inter','Aptos Display','Aptos','Segoe UI',sans-serif" font-size="15" font-weight="700"
        fill="#f0ebe7">Harness</text>

  <!-- ─── Prompt sub-card ─── -->
  <rect x="530" y="140" width="264" height="178" rx="10"
        fill="rgba(126,179,207,0.09)" stroke="rgba(126,179,207,0.38)" stroke-width="1.2"/>
  <text x="662" y="167" text-anchor="middle"
        font-family="'Inter','Aptos Display','Aptos','Segoe UI',sans-serif" font-size="13" font-weight="700"
        fill="#7eb3cf">Prompt</text>
  <!-- Document icon, centered at (662, 238) -->
  <g transform="translate(636,190)">
    <rect x="0" y="0" width="44" height="56" rx="5" fill="#7eb3cf" opacity="0.55"/>
    <!-- Dog-ear fold -->
    <path d="M30,0 L44,14 L30,14 Z" fill="#5c91ae" opacity="0.8"/>
    <!-- Lines -->
    <line x1="7" y1="22" x2="37" y2="22" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
    <line x1="7" y1="31" x2="37" y2="31" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
    <line x1="7" y1="40" x2="27" y2="40" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
  </g>

  <!-- ─── Tools sub-card ─── -->
  <rect x="810" y="140" width="264" height="178" rx="10"
        fill="rgba(110,207,128,0.09)" stroke="rgba(110,207,128,0.38)" stroke-width="1.2"/>
  <text x="942" y="167" text-anchor="middle"
        font-family="'Inter','Aptos Display','Aptos','Segoe UI',sans-serif" font-size="13" font-weight="700"
        fill="#6ecf80">Tools</text>
  <!-- Wrench icon, centered at (942, 238) -->
  <g transform="translate(917,193)">
    <path d="M44 4 C36 0 24 4 20 14 L4 30 C2 32 2 36 4 38 L12 46 C14 48 18 48 20 46 L36 30 C46 28 50 16 46 6 L38 12 L28 8 Z"
          fill="#6ecf80" opacity="0.7" stroke="none"/>
    <!-- Bolt head -->
    <circle cx="8" cy="42" r="6" fill="#6ecf80" opacity="0.9"/>
  </g>

  <!-- ─── Memory sub-card ─── -->
  <rect x="1090" y="140" width="264" height="178" rx="10"
        fill="rgba(232,168,124,0.09)" stroke="rgba(232,168,124,0.38)" stroke-width="1.2"/>
  <text x="1222" y="167" text-anchor="middle"
        font-family="'Inter','Aptos Display','Aptos','Segoe UI',sans-serif" font-size="13" font-weight="700"
        fill="#e8a87c">Memory</text>
  <!-- Database icon, centered at (1222, 238) -->
  <g transform="translate(1200,196)">
    <!-- Top cap -->
    <ellipse cx="22" cy="7" rx="22" ry="7" fill="#e8a87c" opacity="0.8"/>
    <!-- Body -->
    <rect x="0" y="7" width="44" height="30" fill="#e8a87c" opacity="0.55"/>
    <!-- Bottom cap -->
    <ellipse cx="22" cy="37" rx="22" ry="7" fill="#e8a87c" opacity="0.8"/>
    <!-- Middle line (second disk) -->
    <ellipse cx="22" cy="22" rx="22" ry="7" fill="none" stroke="#d4896a" stroke-width="1.2" opacity="0.6"/>
  </g>

</svg>
